services:
  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    ports:
      - "5050:5050"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/shutter
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongo

  # frontend:
  #   build:
  #     context: ./frontend
  #     args:
  #       NEXT_PUBLIC_API_URL: http://localhost:5050
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://192.168.0.101:5050
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  mongo-data: